<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist page</title>
    <link rel="stylesheet" href="../static/style.css">

</head>

<body>
    <h1 class="title_P">Main page !!!</h1>
    <a href="/page_meta">Ir para metas</a>

    <!-- creates the checklist with the title that user typed -->
    <form action="/create_checklist" method="POST">
        <input type="text" name="titulo" placeholder="Digite o titulo da checklist" required>
        <button>Criar nova checklist</button>
    </form>

    <hr>
    <!-- renderize the checklists in HTML using python, is kind of a bridge-->
    {% for checklist in checklists %}

    <div class="container">
        <h3>{{ checklist.titulo }}</h3>

    <!--Send the request to create a task in the respective checklist, using the checklist id to know what checklist is-->
        <form action="/add_task/{{ checklist.id }}" method="POST">
            <input type="text" name="task" placeholder="Digite a tarefa" required>
            <button type="submit">Adicionar</button>
        </form>

        <ul>
            {% for task in checklist.tarefas %}
            <li>
                <input type="checkbox"> {{ task[0] }}
                <a href="/delete_task/{{ checklist.id }}/{{ loop.index0 }}">
                    <button type="button">Deletar</button>
                </a>
            </li>
            {% endfor %}
        </ul>

    </div> {% endfor %}

</body>

</html>
